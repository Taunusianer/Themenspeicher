<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --paper: #fdfaf4;
    --ink: #1a1612;
    --muted: #8a8070;
    --border: #d8cfc0;
    --accent: #2b4a2b;
    --privat: #1e3a6e;
    --dfa: #c45a00;
    --hoch: #b52a2a;
    --mittel: #8a6a00;
    --niedrig: #2b6b2b;
    --radius: 3px;
    --shadow: 0 2px 12px rgba(26,22,18,0.08);
  }

  body {
    background: var(--bg);
    background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,165,140,0.15) 27px, rgba(180,165,140,0.15) 28px);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 40px 20px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 8vw, 60px);
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -1px;
    line-height: 1;
  }

  .subtitle {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 8px;
  }

  .card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px 28px;
    width: 100%;
    max-width: 560px;
  }

  .field { margin-bottom: 22px; }

  label {
    display: block;
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }

  input[type="text"],
  textarea {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--border);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    padding: 8px 2px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  input[type="text"]:focus,
  textarea:focus { border-color: var(--accent); }
  input[type="text"]::placeholder,
  textarea::placeholder { color: var(--border); }
  textarea { min-height: 56px; line-height: 1.5; }

  /* AREA TOGGLE */
  .toggle-row { display: flex; gap: 10px; }

  .toggle-btn {
    flex: 1;
    padding: 11px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.18s;
  }
  .toggle-btn:hover { border-color: var(--ink); color: var(--ink); }
  .toggle-btn.active-privat { border-color: var(--privat); color: var(--privat); background: rgba(30,58,110,0.06); font-weight: 500; }
  .toggle-btn.active-dfa    { border-color: var(--dfa);    color: var(--dfa);    background: rgba(196,90,0,0.06);  font-weight: 500; }

  /* PRIORITY */
  .mic-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin: 4px 0 12px;
  }

  .mic-btn {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--paper);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .mic-btn svg { width: 38px; height: 38px; }
  .mic-btn:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .mic-btn.recording {
    border-color: var(--hoch);
    background: rgba(181,42,42,0.05);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .mic-btn.recording svg path,
  .mic-btn.recording svg line { stroke: var(--hoch); }
  .mic-btn.recording svg path:first-child { fill: rgba(181,42,42,0.15); }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(181,42,42,0.3); }
    50%       { box-shadow: 0 0 0 14px rgba(181,42,42,0); }
  }

  .mic-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .mic-label.listening { color: var(--hoch); }

  .voice-result {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    min-height: 16px;
    font-style: italic;
  }

  .prio-track { display: flex; gap: 8px; }

  .prio-opt {
    flex: 1;
    padding: 10px 4px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--muted);
    text-align: center;
    transition: all 0.15s;
    user-select: none;
  }
  .prio-opt:hover { border-color: #999; color: var(--ink); }
  .prio-opt.active-hoch    { border-color: var(--hoch);    color: var(--hoch);    background: rgba(181,42,42,0.05); }
  .prio-opt.active-mittel  { border-color: var(--mittel);  color: var(--mittel);  background: rgba(138,106,0,0.05); }
  .prio-opt.active-niedrig { border-color: var(--niedrig); color: var(--niedrig); background: rgba(43,107,43,0.05); }

  .tab-hint {
    font-size: 9px;
    color: var(--muted);
    margin-top: 6px;
  }
  .tab-hint kbd {
    background: var(--border);
    border-radius: 2px;
    padding: 1px 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
  }

  /* DIVIDER */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 8px 0 22px;
  }

  /* SUBMIT */
  .submit-btn {
    width: 100%;
    margin-top: 24px;
    padding: 15px;
    background: var(--accent);
    color: #f5f0e8;
    border: none;
    border-radius: var(--radius);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .submit-btn:hover  { opacity: 0.88; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .status-msg {
    margin-top: 14px;
    padding: 11px 14px;
    border-radius: var(--radius);
    font-size: 11px;
    display: none;
    border-left: 3px solid transparent;
  }
  .status-msg.ok   { display:block; border-left-color: var(--niedrig); background: rgba(43,107,43,0.05); color: var(--niedrig); }
  .status-msg.err  { display:block; border-left-color: var(--hoch);    background: rgba(181,42,42,0.05); color: var(--hoch); }
  .status-msg.spin { display:block; border-left-color: var(--border);  background: rgba(0,0,0,0.02);     color: var(--muted); }

  /* RECENT */
  .recent { margin-top: 32px; width: 100%; max-width: 560px; }
  .recent-title {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    padding-left: 2px;
  }
  .entry {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity:0; transform: translateX(-6px); }
    to   { opacity:1; transform: translateX(0); }
  }
  .entry-name { font-size: 13px; color: var(--ink); flex: 1; }
  .entry-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
  .tag {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 2px;
    white-space: nowrap;
  }
  .tag-privat  { color: var(--privat); background: rgba(30,58,110,0.08); }
  .tag-dfa     { color: var(--dfa);    background: rgba(196,90,0,0.08); }
  .tag-hoch    { color: var(--hoch);   background: rgba(181,42,42,0.07); }
  .tag-mittel  { color: var(--mittel); background: rgba(138,106,0,0.07); }
  .tag-niedrig { color: var(--niedrig);background: rgba(43,107,43,0.07); }
</style>
</head>
<body>

<header>
  <h1>Tasks</h1>
  <p class="subtitle">Notion · New Entry</p>
</header>

<div class="card">

  <!-- AREA -->
  <div class="field">
    <label>Area</label>
    <div class="toggle-row">
      <button class="toggle-btn" data-b="Privat" onclick="setArea(this)">🔵 Private</button>
      <button class="toggle-btn" data-b="DFA"    onclick="setArea(this)">🟠 DFA</button>
    </div>
  </div>

  <!-- TASK -->
  <div class="field">
    <label>Task</label>
    <input type="text" id="taskName" placeholder="Enter task …" autocomplete="off">
  </div>

  <!-- PRIORITY via voice + tab -->
  <div class="field">
    <label>Priority — voice or Tab key</label>
    <div class="mic-section">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Set priority by voice">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2a3.5 3.5 0 0 1 3.5 3.5v6a3.5 3.5 0 0 1-7 0V5.5A3.5 3.5 0 0 1 12 2z" stroke="#1a1612" stroke-width="1.5" fill="none"/>
          <path d="M19 11a7 7 0 0 1-14 0" stroke="#1a1612" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <line x1="12" y1="18" x2="12" y2="22" stroke="#1a1612" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="9"  y1="22" x2="15" y2="22" stroke="#1a1612" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="mic-label" id="micLabel">Record</span>
      <span class="voice-result" id="voiceResult">–</span>
    </div>
    <div class="prio-track" id="prioTrack">
      <div class="prio-opt" data-p="hoch"    tabindex="0" onclick="setPrio(this)">↑ High</div>
      <div class="prio-opt" data-p="mittel"  tabindex="0" onclick="setPrio(this)">→ Medium</div>
      <div class="prio-opt" data-p="niedrig" tabindex="0" onclick="setPrio(this)">↓ Low</div>
    </div>
    <p class="tab-hint"><kbd>Tab</kbd> to cycle · <kbd>Enter</kbd> to confirm</p>
  </div>

  <hr class="divider">

  <!-- STATUS -->
  <div class="field">
    <label>Status</label>
    <input type="text" id="statusField" placeholder="e.g. In progress, Blocked …" autocomplete="off">
  </div>

  <!-- REMARKS -->
  <div class="field">
    <label>Remarks</label>
    <textarea id="remarksField" placeholder="Optional notes …" rows="2"></textarea>
  </div>

  <button class="submit-btn" onclick="addTask()">+ Save Entry</button>
  <div class="status-msg" id="statusMsg"></div>
</div>

<div class="recent" id="recentSection" style="display:none">
  <div class="recent-title">Recently Added</div>
  <div id="entryList"></div>
</div>

<script>
  const DS_ID = "34706a31-21ef-80a9-acfe-000b283b84f8";
  let selectedArea = null;
  let selectedPrio = null;
  const recentItems = [];

  // ── AREA ──
  function setArea(btn) {
    document.querySelectorAll('.toggle-btn').forEach(b => b.className = 'toggle-btn');
    selectedArea = btn.dataset.b;
    btn.classList.add('active-' + selectedArea.toLowerCase());
  }

  // ── PRIORITY (click) ──
  const prioOpts = () => [...document.querySelectorAll('.prio-opt')];

  function setPrio(el) {
    prioOpts().forEach(o => o.className = 'prio-opt');
    selectedPrio = el.dataset.p;
    el.classList.add('active-' + selectedPrio);
    const labels = { hoch: 'High', mittel: 'Medium', niedrig: 'Low' };
    document.getElementById('voiceResult').textContent = '✓ ' + labels[selectedPrio];
  }

  // ── TAB cycling ──
  const prioOrder = ['hoch', 'mittel', 'niedrig'];
  document.addEventListener('keydown', e => {
    const active = document.activeElement;
    const isInput = active.tagName === 'INPUT' || active.tagName === 'TEXTAREA';
    if (e.key === 'Tab' && !e.shiftKey && !isInput) {
      e.preventDefault();
      const cur = prioOrder.indexOf(selectedPrio);
      const next = prioOrder[(cur + 1) % prioOrder.length];
      const el = document.querySelector(`.prio-opt[data-p="${next}"]`);
      if (el) setPrio(el);
    }
    if (e.key === 'Enter' && active.classList.contains('prio-opt')) {
      setPrio(active);
    }
  });

  // ── VOICE ──
  let recognition = null;
  let isRecording = false;

  const voiceMap = {
    'high': 'hoch', 'hoch': 'hoch', 'ho': 'hoch', 'höchste': 'hoch', 'important': 'hoch', 'urgent': 'hoch',
    'medium': 'mittel', 'mittel': 'mittel', 'normal': 'mittel', 'middle': 'mittel', 'mid': 'mittel',
    'low': 'niedrig', 'niedrig': 'niedrig', 'gering': 'niedrig', 'tief': 'niedrig', 'minor': 'niedrig'
  };

  function toggleMic() {
    if (isRecording) { stopMic(); return; }
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      document.getElementById('voiceResult').textContent = '⚠ Speech recognition not available';
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 5;

    recognition.onstart = () => {
      isRecording = true;
      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micLabel').textContent = 'Listening …';
      document.getElementById('micLabel').classList.add('listening');
      document.getElementById('voiceResult').textContent = '🎙 Say: high / medium / low';
    };

    recognition.onresult = (e) => {
      const results = [...e.results[0]].map(r => r.transcript.toLowerCase().trim());
      let found = null;
      for (const text of results) {
        for (const [word, val] of Object.entries(voiceMap)) {
          if (text.includes(word)) { found = val; break; }
        }
        if (found) break;
      }
      if (found) {
        const el = document.querySelector(`.prio-opt[data-p="${found}"]`);
        if (el) setPrio(el);
      } else {
        document.getElementById('voiceResult').textContent = `⚠ Not recognised: "${results[0]}"`;
      }
    };

    recognition.onerror = (e) => {
      document.getElementById('voiceResult').textContent = '⚠ Error: ' + e.error;
      stopMic();
    };
    recognition.onend = () => stopMic();
    recognition.start();
  }

  function stopMic() {
    isRecording = false;
    if (recognition) { try { recognition.stop(); } catch(e){} }
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micLabel').textContent = 'Record';
    document.getElementById('micLabel').classList.remove('listening');
  }

  // ── STATUS MSG ──
  function showStatus(type, msg) {
    const el = document.getElementById('statusMsg');
    el.className = 'status-msg ' + type;
    el.textContent = msg;
  }

  // ── SAVE ──
  async function addTask() {
    const name     = document.getElementById('taskName').value.trim();
    const status   = document.getElementById('statusField').value.trim();
    const remarks  = document.getElementById('remarksField').value.trim();

    if (!name)        { showStatus('err', '⚠ Please enter a task name.'); return; }
    if (!selectedArea){ showStatus('err', '⚠ Please select an area (Private or DFA).'); return; }

    const btn = document.querySelector('.submit-btn');
    btn.disabled = true;
    showStatus('spin', '⏳ Saving …');

    const prioLine    = selectedPrio ? `- Priority (select): "${selectedPrio}"` : '';
    const statusLine  = status  ? `- Status (text): "${status}"` : '';
    const remarksLine = remarks ? `- Remarks (text): "${remarks}"` : '';

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          mcp_servers: [{ type: "url", url: "https://mcp.notion.com/mcp", name: "notion-mcp" }],
          messages: [{
            role: "user",
            content: `Create a page in the Notion data source with id "${DS_ID}".
Properties:
- Tasks (title): "${name}"
- Area (select): "${selectedArea}"
${prioLine}
${statusLine}
${remarksLine}
Reply only: DONE`
          }]
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);

      const pLabels = { hoch: 'High', mittel: 'Medium', niedrig: 'Low' };
      const pLabel = selectedPrio ? pLabels[selectedPrio] : null;
      showStatus('ok', `✓ "${name}" saved${pLabel ? ' · ' + pLabel : ''}${selectedArea ? ' · ' + selectedArea : ''}.`);
      addToRecent(name, selectedArea, selectedPrio);

      // reset
      document.getElementById('taskName').value = '';
      document.getElementById('statusField').value = '';
      document.getElementById('remarksField').value = '';
      document.querySelectorAll('.toggle-btn').forEach(b => b.className = 'toggle-btn');
      prioOpts().forEach(o => o.className = 'prio-opt');
      document.getElementById('voiceResult').textContent = '–';
      selectedArea = null;
      selectedPrio = null;
    } catch (e) {
      showStatus('err', '✗ Error: ' + e.message);
    } finally {
      btn.disabled = false;
    }
  }

  // Enter in task field
  document.getElementById('taskName').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // ── RECENT ──
  function addToRecent(name, area, prio) {
    recentItems.unshift({ name, area, prio });
    if (recentItems.length > 6) recentItems.pop();
    renderRecent();
  }

  function renderRecent() {
    const sec  = document.getElementById('recentSection');
    const list = document.getElementById('entryList');
    const pLabels = { hoch: 'High', mittel: 'Medium', niedrig: 'Low' };
    list.innerHTML = '';
    recentItems.forEach(item => {
      const pTag = item.prio ? `<span class="tag tag-${item.prio}">${pLabels[item.prio]}</span>` : '';
      const aTag = item.area ? `<span class="tag tag-${item.area.toLowerCase()}">${item.area}</span>` : '';
      list.innerHTML += `
        <div class="entry">
          <span class="entry-name">${item.name}</span>
          <span class="entry-meta">${pTag}${aTag}</span>
        </div>`;
    });
    sec.style.display = 'block';
  }
</script>
</body>
</html>
