<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Themen">
<meta name="theme-color" content="#0f0f0f">
<title>Themenspeicher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --green-border: rgba(74,222,128,0.3);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.1);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.1);
    --radius: 16px;
    --radius-sm: 10px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --p1: #f87171;
    --p2: #fb923c;
    --p3: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100dvh; padding-bottom: env(safe-area-inset-bottom); }
  .app { max-width: 480px; margin: 0 auto; padding: 0 0 120px; }

  .header { padding: 56px 20px 20px; display: flex; align-items: flex-end; justify-content: space-between; }
  .header h1 { font-size: 28px; font-weight: 300; letter-spacing: -0.5px; }
  .header p { font-size: 13px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
  .notion-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; font-family: var(--mono); padding: 5px 10px; border-radius: 99px; cursor: pointer; user-select: none; color: var(--green); background: var(--green-dim); border: 1px solid var(--green-border); }
  .notion-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; }
  .notion-badge.no-proxy { color: var(--amber); background: var(--amber-dim); border-color: rgba(251,191,36,0.3); }
  .notion-badge.no-proxy::before { background: var(--amber); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Settings */
  .settings-panel { margin: 0 16px 12px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 16px; display: none; }
  .settings-panel.show { display: block; }
  .settings-title { font-size: 11px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .settings-panel input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 14px; font-family: var(--mono); font-size: 13px; color: var(--text); outline: none; margin-bottom: 8px; }
  .settings-panel input::placeholder { color: var(--text3); }
  .settings-row { display: flex; gap: 8px; }
  .btn-settings-save { flex: 1; height: 40px; background: var(--green); color: #000; border: none; border-radius: var(--radius-sm); font-family: var(--font); font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-settings-clear { height: 40px; padding: 0 14px; background: none; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-family: var(--mono); font-size: 12px; color: var(--red); cursor: pointer; }
  .settings-hint { font-size: 11px; font-family: var(--mono); color: var(--text3); margin-top: 8px; line-height: 1.5; }

  /* Input card */
  .input-card { margin: 0 16px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .field { display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border); }
  .field-label { font-size: 11px; font-family: var(--mono); color: var(--text3); min-width: 76px; text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0; }
  .field input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: var(--font); font-size: 16px; padding: 16px 0 16px 12px; width: 100%; -webkit-appearance: none; }
  .field input::placeholder { color: var(--text3); }

  /* Priority selector */
  .prio-field { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); gap: 12px; }
  .prio-label { font-size: 11px; font-family: var(--mono); color: var(--text3); min-width: 76px; text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0; }
  .prio-options { display: flex; gap: 8px; flex: 1; }
  .prio-btn {
    flex: 1; height: 36px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text3);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .prio-btn.p1.active { background: rgba(248,113,113,0.15); border-color: var(--p1); color: var(--p1); }
  .prio-btn.p2.active { background: rgba(251,146,60,0.15); border-color: var(--p2); color: var(--p2); }
  .prio-btn.p3.active { background: rgba(74,222,128,0.15); border-color: var(--p3); color: var(--p3); }

  .action-row { display: flex; gap: 10px; padding: 12px 16px; border-top: 1px solid var(--border); align-items: center; }
  .btn-mic { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .btn-mic.rec { background: var(--red-dim); border-color: var(--red); color: var(--red); animation: mic-pulse 1s infinite; }
  @keyframes mic-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0.3)} 50%{box-shadow:0 0 0 8px rgba(248,113,113,0)} }
  .btn-save { flex: 1; height: 44px; background: var(--green); color: #000; border: none; border-radius: var(--radius-sm); font-family: var(--font); font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s, transform 0.1s; }
  .btn-save:active { transform: scale(0.97); opacity: 0.85; }
  .rec-status { display: none; align-items: center; gap: 6px; font-size: 12px; color: var(--red); font-family: var(--mono); padding: 0 16px 10px; }
  .rec-status.show { display: flex; }
  .rec-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: blink 0.6s infinite; }

  .page-link-row { display: none; align-items: center; gap: 8px; padding: 10px 20px 0; font-size: 12px; font-family: var(--mono); color: var(--text3); }
  .page-link-row.show { display: flex; }
  .page-link-row a { color: var(--green); text-decoration: none; }

  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 10px; }
  .section-title { font-size: 11px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
  .section-actions { display: flex; gap: 8px; }
  .btn-sm { font-size: 12px; font-family: var(--mono); color: var(--text3); background: none; border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; cursor: pointer; }
  .btn-sm.danger { color: var(--red); }

  .items { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; font-family: var(--mono); border: 1px dashed var(--border); border-radius: var(--radius); white-space: pre-line; line-height: 1.7; }

  .item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }
  .item.synced { border-color: rgba(74,222,128,0.15); }
  .item.error { border-color: rgba(248,113,113,0.15); }
  .item-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .item-status.ok { background: var(--green); }
  .item-status.err { background: var(--red); }
  .item-status.pending { background: var(--amber); animation: blink 0.8s infinite; }
  .item-body { flex: 1; min-width: 0; }
  .item-topic { font-size: 15px; color: var(--text); word-break: break-word; line-height: 1.4; }
  .item-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; align-items: center; }
  .item-ts { font-size: 11px; font-family: var(--mono); color: var(--text3); }
  .item-cat { font-size: 11px; font-family: var(--mono); padding: 2px 8px; border-radius: 6px; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .item-prio { font-size: 11px; font-family: var(--mono); padding: 2px 8px; border-radius: 6px; }
  .item-prio.hoch { background: rgba(248,113,113,0.12); color: var(--p1); border: 1px solid rgba(248,113,113,0.25); }
  .item-prio.mittel { background: rgba(251,146,60,0.12); color: var(--p2); border: 1px solid rgba(251,146,60,0.25); }
  .item-prio.niedrig { background: rgba(74,222,128,0.12); color: var(--p3); border: 1px solid rgba(74,222,128,0.25); }
  .item-sync { font-size: 11px; font-family: var(--mono); }
  .item-sync.ok { color: var(--green); }
  .item-sync.err { color: var(--red); }
  .item-sync.pending { color: var(--amber); }
  .item-del { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; padding: 0 2px; border-radius: 6px; line-height: 1; flex-shrink: 0; }
  .item-del:active { color: var(--red); }

  .export-box { margin: 16px 16px 0; display: none; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .export-box.show { display: block; }
  .export-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .export-top span { font-size: 11px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
  #exp-box { width: 100%; height: 90px; background: none; border: none; padding: 12px 14px; font-size: 11px; font-family: var(--mono); color: var(--text2); resize: none; outline: none; }

  .toast { position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border2); color: var(--text); font-size: 13px; font-family: var(--mono); padding: 10px 18px; border-radius: 99px; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 100; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok { border-color: var(--green-border); color: var(--green); }
  .toast.err { border-color: rgba(248,113,113,0.3); color: var(--red); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>Themen&shy;speicher</h1>
      <p id="entry-count">0 Einträge</p>
    </div>
    <div class="notion-badge no-proxy" id="notion-badge">Notion ⚙</div>
  </div>

  <div class="settings-panel" id="settings-panel">
    <div class="settings-title">Proxy-URL (Cloudflare Worker)</div>
    <input id="proxy-input" type="url" placeholder="https://notion-proxy.NAME.workers.dev" />
    <div class="settings-row">
      <button class="btn-settings-save" id="proxy-save-btn">Speichern</button>
      <button class="btn-settings-clear" id="proxy-clear-btn">Zurücksetzen</button>
    </div>
    <div class="settings-hint">Tippe auf "Notion ⚙" oben rechts um diese Einstellungen zu öffnen oder zu schließen.</div>
  </div>

  <div class="input-card">
    <div class="field">
      <span class="field-label">Thema</span>
      <input id="topic" type="text" placeholder="Thema eingeben…" autocomplete="off" />
    </div>
    <div class="field">
      <span class="field-label">Kategorie</span>
      <input id="cat" type="text" placeholder="Arbeit · Idee · Privat…" autocomplete="off" />
    </div>
    <div class="prio-field">
      <span class="prio-label">Priorität</span>
      <div class="prio-options">
        <button class="prio-btn p1" data-prio="Hoch">🔴 Hoch</button>
        <button class="prio-btn p2" data-prio="Mittel">🟠 Mittel</button>
        <button class="prio-btn p3 active" data-prio="Niedrig">🟢 Niedrig</button>
      </div>
    </div>
    <div class="action-row">
      <button class="btn-mic" id="mic-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="9" y="2" width="6" height="12" rx="3" stroke="currentColor" stroke-width="1.8"/>
          <path d="M5 11a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M12 18v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="btn-save" id="save-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L19 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        In Notion speichern
      </button>
    </div>
    <div class="rec-status" id="rec-status">
      <span class="rec-dot"></span> Aufnahme läuft — sprechen…
    </div>
  </div>

  <div class="page-link-row" id="page-link-row">
    <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#4ade80"/></svg>
    <a id="page-link" href="#" target="_blank">Notion-Seite öffnen ↗</a>
  </div>

  <div class="section-header">
    <span class="section-title">Einträge</span>
    <div class="section-actions">
      <button class="btn-sm" id="export-btn">Export</button>
      <button class="btn-sm danger" id="clear-btn">Leeren</button>
    </div>
  </div>

  <div class="items" id="list"></div>

  <div class="export-box" id="exp-area">
    <div class="export-top">
      <span>CSV Export</span>
      <button class="btn-sm" id="copy-btn">Kopieren</button>
    </div>
    <textarea id="exp-box" readonly></textarea>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DB_ID = '34706a3121ef80858191c5c07907802e';
let items = JSON.parse(localStorage.getItem('themen_v4') || '[]');
let notionPageId = localStorage.getItem('themen_page_id') || null;
let proxyUrl = localStorage.getItem('proxy_url') || '';
let selectedPrio = 'Niedrig';
let recognition = null, isRecording = false;

// Priority buttons
document.querySelectorAll('.prio-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.prio-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedPrio = btn.dataset.prio;
  });
});

function resetPrio() {
  document.querySelectorAll('.prio-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.prio-btn.p3').classList.add('active');
  selectedPrio = 'Niedrig';
}

function updateBadge() {
  const b = document.getElementById('notion-badge');
  if (proxyUrl) { b.textContent = 'Notion ✓'; b.className = 'notion-badge'; }
  else { b.textContent = 'Notion ⚙'; b.className = 'notion-badge no-proxy'; }
}

function initProxy() {
  if (proxyUrl) document.getElementById('proxy-input').value = proxyUrl;
  else document.getElementById('settings-panel').classList.add('show');
  updateBadge();
}

document.getElementById('notion-badge').addEventListener('click', () => {
  document.getElementById('settings-panel').classList.toggle('show');
});

document.getElementById('proxy-save-btn').addEventListener('click', () => {
  const val = document.getElementById('proxy-input').value.trim().replace(/\/$/, '');
  if (!val.startsWith('http')) { showToast('Bitte eine gültige URL eingeben', 'err'); return; }
  proxyUrl = val;
  localStorage.setItem('proxy_url', proxyUrl);
  document.getElementById('settings-panel').classList.remove('show');
  updateBadge();
  showToast('Proxy gespeichert ✓');
});

document.getElementById('proxy-clear-btn').addEventListener('click', () => {
  proxyUrl = '';
  localStorage.removeItem('proxy_url');
  localStorage.removeItem('themen_page_id');
  notionPageId = null;
  document.getElementById('proxy-input').value = '';
  document.getElementById('page-link-row').classList.remove('show');
  updateBadge();
  showToast('Zurückgesetzt');
});

function apiUrl(path) { return `${proxyUrl}/proxy/${path}`; }

function fmt() {
  return new Date().toLocaleString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 2800);
}

function persist() { localStorage.setItem('themen_v4', JSON.stringify(items)); }

function updateCount() {
  const n = items.length;
  document.getElementById('entry-count').textContent =
    n === 0 ? 'Noch keine Einträge' : n === 1 ? '1 Eintrag' : `${n} Einträge`;
}

function renderPageLink() {
  if (!notionPageId) return;
  document.getElementById('page-link-row').classList.add('show');
  document.getElementById('page-link').href = `https://notion.so/${notionPageId.replace(/-/g,'')}`;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function prioClass(p) {
  if (p === 'Hoch') return 'hoch';
  if (p === 'Mittel') return 'mittel';
  return 'niedrig';
}

function prioEmoji(p) {
  if (p === 'Hoch') return '🔴';
  if (p === 'Mittel') return '🟠';
  return '🟢';
}

function render() {
  const list = document.getElementById('list');
  updateCount();
  if (!items.length) {
    list.innerHTML = `<div class="empty">Kein Thema gespeichert.\nEinfach oben eingeben\nund auf Speichern tippen.</div>`;
    return;
  }
  list.innerHTML = '';
  [...items].reverse().forEach((item, ri) => {
    const i = items.length - 1 - ri;
    const sc = item.synced ? 'ok' : item.err ? 'err' : 'pending';
    const sl = item.synced ? '✓ Notion' : item.err ? '✗ Fehler' : '… sync';
    const div = document.createElement('div');
    div.className = `item ${item.synced ? 'synced' : item.err ? 'error' : ''}`;
    div.innerHTML = `
      <div class="item-status ${sc}"></div>
      <div class="item-body">
        <div class="item-topic">${esc(item.topic)}</div>
        <div class="item-meta">
          <span class="item-prio ${prioClass(item.prio)}">${prioEmoji(item.prio)} ${item.prio}</span>
          ${item.cat ? `<span class="item-cat">${esc(item.cat)}</span>` : ''}
          <span class="item-ts">${item.ts}</span>
          <span class="item-sync ${sc}">${sl}</span>
        </div>
      </div>
      <button class="item-del" onclick="del(${i})">×</button>`;
    list.appendChild(div);
  });
}

function del(i) { items.splice(i, 1); persist(); render(); }

async function ensurePage() {
  if (notionPageId) return notionPageId;
  if (!proxyUrl) throw new Error('Bitte zuerst Proxy-URL eintragen');
  const res = await fetch(apiUrl('pages'), {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ parent: { database_id: DB_ID }, properties: { Name: { title: [{ text: { content: 'Themenspeicher' } }] } } })
  });
  if (!res.ok) throw new Error('Seite konnte nicht erstellt werden');
  const data = await res.json();
  notionPageId = data.id;
  localStorage.setItem('themen_page_id', notionPageId);
  renderPageLink();
  return notionPageId;
}

async function appendBlock(item) {
  const pageId = await ensurePage();
  // Reihenfolge: Thema | Priorität | Datum (| Kategorie falls vorhanden)
  const text = `${item.topic} | ${prioEmoji(item.prio)} ${item.prio} | ${item.ts}${item.cat ? ' | ' + item.cat : ''}`;
  const res = await fetch(apiUrl(`blocks/${pageId}/children`), {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      children: [{
        object: 'block', type: 'to_do',
        to_do: { rich_text: [{ type: 'text', text: { content: text } }], checked: false }
      }]
    })
  });
  if (!res.ok) throw new Error('Eintrag konnte nicht gespeichert werden');
}

async function saveEntry() {
  const topic = document.getElementById('topic').value.trim();
  const cat = document.getElementById('cat').value.trim();
  if (!topic) { showToast('Bitte ein Thema eingeben', 'err'); return; }
  if (!proxyUrl) { document.getElementById('settings-panel').classList.add('show'); showToast('Bitte zuerst Proxy-URL eintragen', 'err'); return; }

  const item = { topic, cat, prio: selectedPrio, ts: fmt(), synced: false, err: false };
  items.push(item); persist(); render();
  document.getElementById('topic').value = '';
  document.getElementById('cat').value = '';
  resetPrio();
  showToast('Wird gespeichert…');

  try {
    await appendBlock(item);
    items[items.length - 1].synced = true;
    showToast('Gespeichert ✓');
  } catch(e) {
    items[items.length - 1].err = true;
    showToast('Fehler: ' + e.message, 'err');
  }
  persist(); render();
}

document.getElementById('save-btn').addEventListener('click', saveEntry);
document.getElementById('topic').addEventListener('keydown', e => { if (e.key === 'Enter') saveEntry(); });

document.getElementById('mic-btn').addEventListener('click', () => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Sprache nur in Chrome/Edge verfügbar', 'err'); return; }
  if (isRecording) { recognition.stop(); return; }
  recognition = new SR();
  recognition.lang = 'de-DE'; recognition.interimResults = false;
  recognition.onstart = () => { isRecording = true; document.getElementById('mic-btn').classList.add('rec'); document.getElementById('rec-status').classList.add('show'); };
  recognition.onresult = e => { const t = e.results[0][0].transcript; const el = document.getElementById('topic'); el.value = el.value ? el.value + ' ' + t : t; };
  recognition.onend = () => { isRecording = false; document.getElementById('mic-btn').classList.remove('rec'); document.getElementById('rec-status').classList.remove('show'); };
  recognition.onerror = () => { isRecording = false; document.getElementById('mic-btn').classList.remove('rec'); document.getElementById('rec-status').classList.remove('show'); showToast('Spracheingabe fehlgeschlagen', 'err'); };
  recognition.start();
});

document.getElementById('export-btn').addEventListener('click', () => {
  if (!items.length) { showToast('Keine Einträge vorhanden', 'err'); return; }
  const csv = 'Thema,Priorität,Erfassungsdatum,Kategorie,Status\n' +
    items.map(it => `"${it.topic}","${it.prio}","${it.ts}","${it.cat || ''}","${it.synced ? 'OK' : 'Fehler'}"`).join('\n');
  document.getElementById('exp-box').value = csv;
  document.getElementById('exp-area').classList.toggle('show');
});

document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('exp-box').value).then(() => showToast('Kopiert ✓')).catch(() => showToast('Kopieren fehlgeschlagen', 'err'));
});

document.getElementById('clear-btn').addEventListener('click', () => {
  if (!items.length) return;
  if (confirm('Alle lokalen Einträge löschen?\n(Notion-Seite bleibt erhalten)')) { items = []; persist(); render(); document.getElementById('exp-area').classList.remove('show'); }
});

initProxy(); render(); renderPageLink();
</script>
</body>
</html>
